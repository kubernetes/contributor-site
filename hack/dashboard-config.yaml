# Community Resilience Dashboard Configuration

# List of SIGs to include in the dashboard
# These should match the 'dir' names in the official sigs.yaml
target_sigs:
  - sig-api-machinery
  - sig-apps
  - sig-architecture
  - sig-auth
  - sig-autoscaling
  - sig-cli
  - sig-cloud-provider
  - sig-cluster-lifecycle
  - sig-contributor-experience
  - sig-docs
  - sig-etcd
  - sig-instrumentation
  - sig-k8s-infra
  - sig-multicluster
  - sig-network
  - sig-node
  - sig-release
  - sig-scalability
  - sig-scheduling
  - sig-security
  - sig-storage
  - sig-testing
  - sig-ui
  - sig-windows

# Manual repository additions that might not be correctly linked in sigs.yaml
additional_repos:
  - repo: elekto-dev/elekto
    subproject: elections

# Overrides for specific repositories to handle non-standard layouts or documentation
overrides:
  "kubernetes/community":
    onboarding_url: "https://www.kubernetes.dev/docs/guide/"
  "kubernetes-sigs/maintainers":
    onboarding_url: "https://github.com/kubernetes-sigs/maintainers"
  "elekto-dev/elekto":
    owners_url: "https://github.com/elekto-dev/elekto/graphs/contributors"
