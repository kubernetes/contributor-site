<div class="lottery-factor-container my-4">
  <div id="lotteryTreemap" class="lottery-treemap-canvas"></div>
  <div class="mt-2 text-muted small text-end" id="lastUpdated"></div>
</div>

<script>
  window.lotteryData = {{ .Site.Data.lottery_factor | jsonify | safeJS }};
</script>

<!-- Project Info Modal -->
<div class="modal fade" id="projectInfoModal" tabindex="-1" aria-labelledby="projectInfoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="projectInfoModalLabel">Project Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="projectInfoBody">
           <!-- Content will be injected by JS -->
        </div>
      </div>
      <div class="modal-footer" id="projectInfoModalFooter">
        <!-- Close button injected by JS for Progressive Enhancement -->
      </div>
    </div>
  </div>
</div>
