baseURL: 'https://www.kubernetes.dev/'
title: Kubernetes Contributors
theme:
  - docsy
enableRobotsTXT: true
# This is a default
#enableGitInfo: false
contentDir: content/en
# These are defaults
#defaultContentLanguage: en
#defaultContentLanguageInSubdir: false
enableMissingTranslationPlaceholders: true
disableKinds:
  - taxonomy
  - taxonomyTerm
# Pygments is no longer used
#pygmentsCodeFences: true
#pygmentsUseClasses: false
#pygmentsUseClassic: false
#pygmentsStyle: tango
permalinks:
  blog: '/:section/:year/:month/:day/:slug/'
imaging:
  resampleFilter: CatmullRom
# These are defaults
#  quality: 75
#  anchor: smart
services:
  googleAnalytics:
    id: UA-00000000-0
caches:
  assets:
    dir: ':cacheDir/_gen'
    maxAge: -1
  getcsv:
    dir: ':cacheDir/:project'
    maxAge: 60s
  getjson:
    dir: ':cacheDir/:project'
    maxAge: 60s
  images:
    dir: ':cacheDir/_images'
    maxAge: -1
  modules:
    dir: ':cacheDir/modules'
    maxAge: -1
languages:
  en:
    title: Kubernetes Contributors
    languageName: English
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: tango
frontmatter:
  date:
    - date
    - ':filename'
    - publishDate
    - lastmod
params:
  # This is used instead of the built-in top level `copyright` to utilize
  # Docsy's partial which adds the copyright year automatically
  copyright: The Kubernetes Authors
  privacy_policy: ''
  version_menu: Releases
  archived_version: false
  version: '0.0'
  gcs_engine_id: 8ad0f1b8442fece81
  algolia_docsearch: false
  offlineSearch: false
  ui:
    sidebar_menu_compact: true
    breadcrumb_disable: false
    sidebar_search_disable: false
    navbar_logo: true
    footer_about_disable: false
    feedback:
      enable: true
  links:
    user:
      - name: Kubernetes Dev Mailing List
        url: 'https://groups.google.com/a/kubernetes.io/group/dev'
        icon: fa fa-envelope
        desc: Discussion and help from your fellow users
      - name: Twitter
        url: 'https://twitter.com/K8sContributors'
        icon: fab fa-twitter
        desc: Follow us on Twitter to get the latest news!
    developer:
      - name: GitHub
        url: 'https://github.com/kubernetes/community'
        icon: fab fa-github
        desc: Home of the Kubernetes Community!
      - name: Slack
        url: 'https://slack.k8s.io'
        icon: fab fa-slack
        desc: Chat with other project developers
